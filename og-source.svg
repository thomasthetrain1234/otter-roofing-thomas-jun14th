<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <!-- Square canvas for qlmanage; the OG card is the middle 1200x630 band
       (y 285 to 915) and gets cropped out with sips after rendering. -->
  <rect width="1200" height="1200" fill="#2e3e42"/>
  <g transform="translate(0,285)">
    <rect x="0" y="600" width="1200" height="30" fill="#a8423d"/>
    <g transform="translate(110,200)">
      <polygon points="115,0 230,115 115,230 0,115" fill="#243034"/>
      <polygon points="115,16 214,115 115,214 16,115" fill="none" stroke="#d9b98a" stroke-width="5"/>
      <polyline points="54,120 115,66 176,120" fill="none" stroke="#a8423d" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="79" y1="143" x2="151" y2="143" stroke="#d9b98a" stroke-width="9" stroke-linecap="round"/>
      <line x1="91" y1="166" x2="139" y2="166" stroke="#d9b98a" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="400" y="265" font-family="Rockwell, Georgia, serif" font-weight="bold" font-size="64" fill="#f7f4ee">OTTER ROOFING</text>
    <text x="402" y="330" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#d9b98a">Veteran-Owned Roofing in Jacksonville, FL</text>
    <text x="402" y="400" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#f7f4ee">One number. One roofer. Start to finish.</text>
  </g>
</svg>
